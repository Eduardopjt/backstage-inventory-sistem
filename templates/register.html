<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - BACKSTAGE</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Inter, system-ui, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .auth-container {
        background: white;
        border-radius: 12px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 400px;
        padding: 40px;
      }
      .auth-container h1 {
        margin: 0 0 8px;
        font-size: 1.8rem;
        color: #1f2937;
        text-align: center;
      }
      .auth-container p {
        margin: 0 0 28px;
        color: #6b7280;
        text-align: center;
        font-size: 0.95rem;
      }
      form {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      input {
        border: 1px solid #d1d5db;
        border-radius: 8px;
        padding: 12px 14px;
        font-size: 0.95rem;
        font-family: inherit;
      }
      input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }
      button {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        padding: 12px 16px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
      }
      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
      }
      .error {
        background: #fee2e2;
        color: #dc2626;
        border: 1px solid #fca5a5;
        border-radius: 8px;
        padding: 12px 14px;
        font-size: 0.9rem;
        display: none;
      }
      .error.show {
        display: block;
      }
      .success {
        background: #dcfce7;
        color: #166534;
        border: 1px solid #86efac;
        border-radius: 8px;
        padding: 12px 14px;
        font-size: 0.9rem;
        display: none;
      }
      .success.show {
        display: block;
      }
      .auth-footer {
        margin-top: 20px;
        text-align: center;
        color: #6b7280;
        font-size: 0.9rem;
      }
      .auth-footer a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
      }
      .auth-footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <h1>Criar Conta</h1>
      <p>Comece a controlar seu estoque com o BACKSTAGE</p>
      
      <div id="error" class="error"></div>
      <div id="success" class="success"></div>
      
      <form id="registerForm">
        <input type="text" id="username" name="username" placeholder="Usuário (mín. 3 caracteres)" required>
        <input type="text" id="company" name="company" placeholder="Empresa ou equipe" required>
        <select id="plan" name="plan">
          <option value="free">Plano Gratuito</option>
          <option value="pro">Plano Pro</option>
        </select>
        <p style="margin:0; color:#6b7280; font-size:.9rem;">Plano gratuito: até 25 itens e 10 categorias. Plano Pro: ilimitado.</p>
        <input type="email" id="email" name="email" placeholder="Email (opcional)">
        <input type="hidden" id="invite_token" name="invite_token" value="{{ invite_token }}">
        <input type="password" id="password" name="password" placeholder="Senha (mín. 6 caracteres)" required>
        <input type="password" id="passwordConfirm" name="password_confirm" placeholder="Confirme a senha" required>
        <button type="submit">Criar Conta</button>
      </form>
      
      <div class="auth-footer">
        Já tem conta? <a href="/login">Faça login</a>
      </div>
    </div>

    <script>
      const inviteTokenValue = document.getElementById("invite_token").value;
      if (inviteTokenValue) {
        document.getElementById("company").required = false;
      }
      document.getElementById("registerForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const username = document.getElementById("username").value;
        const company = document.getElementById("company").value;
        const plan = document.getElementById("plan").value;
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const passwordConfirm = document.getElementById("passwordConfirm").value;
        const errorDiv = document.getElementById("error");
        const successDiv = document.getElementById("success");

        errorDiv.classList.remove("show");
        successDiv.classList.remove("show");

        try {
          const inviteToken = document.getElementById("invite_token").value;
        const response = await fetch("/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, company, plan, email, password, password_confirm: passwordConfirm, invite_token: inviteToken }),
          });

          const data = await response.json();

          if (response.ok) {
            successDiv.textContent = "Conta criada com sucesso! Redirecionando...";
            successDiv.classList.add("show");
            setTimeout(() => {
              window.location.href = "/login";
            }, 2000);
          } else {
            errorDiv.textContent = data.error || "Erro ao criar conta";
            errorDiv.classList.add("show");
          }
        } catch (error) {
          errorDiv.textContent = "Erro na conexão";
          errorDiv.classList.add("show");
        }
      });
    </script>
  </body>
</html>
